version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: comic-backend
    ports:
      - "8000:8000"
    volumes:
      - comic_cache:/app/backend/chapter_cache
      - ./backend/site_data.db:/app/backend/site_data.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - comic-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: comic-frontend
    ports:
      - "90:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - comic-network

networks:
  comic-network:
    driver: bridge

volumes:
  comic_cache:
